<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carte de visite - Marie Dupont</title>
    <style>
        /* Définit le style global de la page */
    body {
        font-family: Arial, sans-serif; /* Définit la police principale du texte (Arial ou police sans-serif par défaut) */
        display: flex; /* Active le mode Flexbox pour organiser les éléments enfants */
        justify-content: center; /* Centre horizontalement le contenu dans la page */
        align-items: center; /* Centre verticalement le contenu */
        min-height: 100vh; /* Donne une hauteur minimale égale à 100% de la hauteur de l'écran */
        margin: 0; /* Supprime les marges par défaut du navigateur */
        background-color: #f5f5f5; /* Définit une couleur de fond gris clair pour la page */
    }

    /* Style de la carte contenant les informations */
    .card {
        background: white; /* Définit un fond blanc pour la carte */
        padding: 40px; /* Ajoute un espace intérieur de 40px autour du contenu */
        border-radius: 10px; /* Arrondit les coins de la carte */
        box-shadow: 0 4px 6px rgba(0,0,0,0.1); /* Ajoute une ombre légère sous la carte pour un effet de profondeur */
        text-align: center; /* Centre le texte horizontalement */
        max-width: 400px; /* Limite la largeur maximale de la carte à 400px */
    }

    /* Style de la photo */
    .photo {
        width: 120px; /* Définit la largeur de l’image */
        height: 120px; /* Définit la hauteur de l’image */
        border-radius: 50%; /* Transforme l’image en cercle */
        object-fit: cover; /* Ajuste l’image pour remplir le cadre sans déformation */
        margin-bottom: 20px; /* Ajoute un espace sous l’image */
    }

    /* Style du titre principal */
    h1 { 
        margin: 0; /* Supprime la marge par défaut du titre */
        color: #333; /* Définit une couleur gris foncé pour le texte */
    }

    /* Style du texte décrivant le métier */
    .job { 
        color: #666; /* Définit une couleur gris moyen */
        margin: 10px 0 20px; /* Marge : 10px en haut, 0 à gauche/droite, 20px en bas */
    }

    /* Style des informations de contact */
    .contact { 
        margin: 10px 0; /* Ajoute une marge en haut et en bas */
    }

    /* Style des liens */
    a { 
        color: #007bff; /* Définit la couleur bleue du lien */
        text-decoration: none; /* Supprime le soulignement par défaut du lien */
    }

    /* Style du lien lorsque la souris passe dessus */
    a:hover { 
        text-decoration: underline; /* Ajoute un soulignement au survol pour indiquer l’interaction */
    }
    </style>
</head>
<body>
    <article class="card">
        <img src="photo.jpg" alt="Marie Dupont" class="photo">
        <h1>Marie Dupont</h1>
        <p class="job">Développeuse Web Front-End</p>
        
        <div class="contact">
            <a href="mailto:marie.dupont@email.com">marie.dupont@email.com</a>
        </div>
        <div class="contact">
            <a href="tel:+33612345678">06 12 34 56 78</a>
        </div>
        <div class="contact">
            <a href="https://maps.google.com/?q=Paris" target="_blank">
                📍 Paris, France
            </a>
        </div>
    </article>
</body>
</html>
